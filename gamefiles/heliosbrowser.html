<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helios Browser</title>
  <link rel="icon" href="/favicon.png" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #121318;
      --panel: #181b22;
      --panel-strong: #20242d;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e9ecf2;
      --muted: #9aa0b4;
      --accent: #6dd7a6;
      --accent-strong: #3bd27d;
      --danger: #f95a5a;
      --radius: 18px;
      --radius-sm: 12px;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #22252f 0%, #101218 55%, #0d1016 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(12, 14, 21, 0.96);
      backdrop-filter: blur(18px);
    }
    .topbar h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin: 0;
      color: var(--text);
      text-transform: uppercase;
    }
    .topbar .buttons {
      display: flex;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      font-size: 0.95rem;
    }
    .btn:hover {
      background: rgba(109, 215, 166, 0.12);
      border-color: var(--accent);
    }
    .btn.primary {
      background: var(--accent);
      color: #0c1218;
      border-color: transparent;
    }
    .panel {
      padding: 14px 18px 0;
      display: grid;
      gap: 14px;
      background: linear-gradient(180deg, rgba(13,16,22,.8), rgba(13,16,22,.7));
      border-bottom: 1px solid var(--border);
    }
    .address-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .address-row input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }
    .address-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(109,215,166,0.12);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
    }
    .controls .info {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .browser-frame {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
    }
    .browser-frame iframe {
      width: 100%;
      height: calc(100vh - 170px);
      border: none;
      display: block;
      background: #0b0d12;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }
    .quick-links button {
      width: 100%;
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      text-align: left;
    }
    .quick-links button:hover {
      background: rgba(109,215,166,0.1);
      transform: translateY(-1px);
    }
    .quick-links button span {
      display: block;
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.84rem;
    }
    .status {
      display: flex;
      justify-content: flex-end;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .start-message {
      padding: 28px 20px;
      color: var(--text);
      line-height: 1.7;
    }
    .start-message h2 {
      margin: 0 0 12px;
      font-size: 1.4rem;
    }
    .start-message ul {
      margin: 12px 0 0 20px;
    }
    .start-message li {
      margin-bottom: 8px;
    }
    @media (max-width: 720px) {
      .browser-frame iframe {
        height: calc(100vh - 280px);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Helios Browser</h1>
    <div class="buttons">
      <button class="btn" id="homeBtn">Home</button>
      <button class="btn" id="openBtn">Open in new tab</button>
      <button class="btn primary" id="goBtn">Go</button>
    </div>
  </header>

  <section class="panel">
    <div class="address-row">
      <input id="addressInput" type="text" placeholder="Search or enter a website URL" autocomplete="off" spellcheck="false" />
      <button class="btn primary" id="previewBtn">Preview</button>
    </div>
    <div class="controls">
      <div class="info">Press Enter or click Go to search. If the page does not load in preview, open it in a new tab.</div>
      <div class="status" id="statusText">Ready</div>
    </div>

    <div class="quick-links">
      <button type="button" data-action="search" data-engine="DuckDuckGo">Search with DuckDuckGo<span>Search the web with privacy</span></button>
      <button type="button" data-action="search" data-engine="Google">Search with Google<span>Fast results and common queries</span></button>
      <button type="button" data-action="search" data-engine="Bing">Search with Bing<span>Alternative engine with AI results</span></button>
      <button type="button" data-action="go" data-url="https://example.com">Example Site<span>Test a direct website URL</span></button>
    </div>
  </section>

  <div class="browser-frame">
    <iframe id="browserFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <script>
    const addressInput = document.getElementById('addressInput');
    const browserFrame = document.getElementById('browserFrame');
    const statusText = document.getElementById('statusText');
    const homeBtn = document.getElementById('homeBtn');
    const openBtn = document.getElementById('openBtn');
    const goBtn = document.getElementById('goBtn');
    const previewBtn = document.getElementById('previewBtn');
    const quickLinks = document.querySelector('.quick-links');

    const engines = {
      DuckDuckGo: 'https://html.duckduckgo.com/html?q=',
      Google: 'https://www.google.com/search?q=',
      Bing: 'https://www.bing.com/search?q=',
    };

    const homePage = 'data:text/html,' + encodeURIComponent(`
      <body style="margin:0;padding:0;font-family:ui-sans-serif,system-ui,sans-serif;background:#11141a;color:#edf2f7;display:flex;align-items:center;justify-content:center;height:100vh;">
        <div style="max-width:540px;text-align:center;padding:24px;">
          <h1 style="font-size:clamp(2rem,4vw,3rem);margin-bottom:18px;">Welcome to Helios Browser</h1>
          <p style="color:#9aa0b4;line-height:1.8;margin-bottom:18px;">Use the address bar to search the web or enter a complete URL. If the preview frame cannot load a site, open it in a new tab for the best result.</p>
          <ul style="text-align:left;color:#cbd5e1;line-height:1.8;margin:0;padding-left:20px;">
            <li>Enter text to search.</li>
            <li>Enter a web address like example.com to visit it.</li>
            <li>Use the Open button to launch pages outside the preview.</li>
          </ul>
        </div>
      </body>
    `);

    function normalizeInput(value) {
      const trimmed = value.trim();
      if (!trimmed) return '';
      if (/^https?:\/\//i.test(trimmed)) return trimmed;
      if (/^([a-z0-9-]+\.)+[a-z]{2,}(\/.*)?$/i.test(trimmed) || trimmed.includes(':')) {
        return 'https://' + trimmed.replace(/^https?:\/\//i, '');
      }
      return null;
    }

    function makeSearchUrl(query, engine) {
      const encoded = encodeURIComponent(query.trim());
      return engines[engine] + encoded;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function loadPreview(url) {
      browserFrame.src = url;
      setStatus('Loading preview...');
    }

    function loadHome() {
      browserFrame.src = homePage;
      addressInput.value = '';
      setStatus('Ready');
    }

    function openInNewTab(url) {
      window.open(url, '_blank');
    }

    function handleInput(value) {
      const directUrl = normalizeInput(value);
      if (directUrl) {
        return directUrl;
      }
      return makeSearchUrl(value, 'DuckDuckGo');
    }

    function go() {
      const value = addressInput.value;
      if (!value.trim()) {
        loadHome();
        return;
      }
      const target = handleInput(value);
      if (target) {
        loadPreview(target);
      }
    }

    function preview() {
      const value = addressInput.value;
      if (!value.trim()) {
        setStatus('Type a query or URL first.');
        return;
      }
      const directUrl = normalizeInput(value);
      if (directUrl) {
        loadPreview(directUrl);
      } else {
        const searchUrl = makeSearchUrl(value, 'DuckDuckGo');
        loadPreview(searchUrl);
      }
    }

    addressInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        go();
      }
    });

    goBtn.addEventListener('click', go);
    previewBtn.addEventListener('click', preview);
    homeBtn.addEventListener('click', loadHome);
    openBtn.addEventListener('click', () => {
      const value = addressInput.value;
      if (!value.trim()) {
        setStatus('Type a URL or search term before opening.');
        return;
      }
      const directUrl = normalizeInput(value);
      openInNewTab(directUrl || makeSearchUrl(value, 'DuckDuckGo'));
    });

    quickLinks.addEventListener('click', event => {
      const button = event.target.closest('button');
      if (!button) return;
      const action = button.dataset.action;
      const url = button.dataset.url;
      const engine = button.dataset.engine;

      if (action === 'search' && engine) {
        const searchUrl = makeSearchUrl('open source proxy browser', engine);
        addressInput.value = `Search with ${engine}`;
        loadPreview(searchUrl);
      }
      if (action === 'go' && url) {
        addressInput.value = url;
        loadPreview(url);
      }
    });

    browserFrame.addEventListener('load', () => {
      setStatus('Preview loaded. Some websites may not allow embedding in iframes.');
    });

    loadHome();
  </script>
</body>
</html>
