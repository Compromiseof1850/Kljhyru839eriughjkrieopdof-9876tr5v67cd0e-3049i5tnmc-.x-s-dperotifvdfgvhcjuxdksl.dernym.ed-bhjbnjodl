<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helios Browser</title>
  <link rel="icon" href="/favicon.png" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #11141c;
      --panel: #181d2b;
      --panel2: #1f2433;
      --border: rgba(255, 255, 255, 0.08);
      --text: #eef2ff;
      --muted: #96a1bb;
      --accent: #62d18c;
      --accent-strong: #26c26c;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #20253c 0%, #0d111b 55%, #080b13 100%);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 18px;
      background: rgba(7, 10, 18, 0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .topbar h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.08em;
      font-weight: 700;
      text-transform: uppercase;
    }
    .buttons {
      margin-left: auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }
    .btn:hover {
      background: rgba(98, 209, 140, 0.16);
      transform: translateY(-1px);
    }
    .btn.primary {
      background: var(--accent);
      color: #071115;
      border-color: transparent;
    }
    .panel {
      padding: 16px 18px 10px;
      background: rgba(15, 18, 28, 0.92);
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: 12px;
    }
    .address-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }
    .address-row input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      outline: none;
      font-size: 1rem;
    }
    .address-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(98,209,140,0.11);
    }
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }
    .quick-links button {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.18s ease;
    }
    .quick-links button:hover {
      background: rgba(98,209,140,0.12);
      transform: translateY(-1px);
    }
    .quick-links button span {
      display: block;
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.87rem;
    }
    .browser-frame {
      flex: 1;
      min-height: 0;
      background: var(--panel2);
      overflow: hidden;
    }
    .browser-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #0b1019;
    }
    .placeholder {
      padding: 26px 22px;
      color: var(--text);
      font-size: 0.98rem;
      line-height: 1.7;
    }
    .placeholder h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.6rem;
    }
    .placeholder ul {
      padding-left: 20px;
    }
    .placeholder li {
      margin-bottom: 8px;
    }
    @media (max-width: 720px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }
      .buttons {
        margin-left: 0;
        justify-content: stretch;
      }
      .address-row {
        grid-template-columns: 1fr;
      }
      .browser-frame iframe {
        height: calc(100vh - 340px);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Helios Browser</h1>
    <div class="buttons">
      <button class="btn" id="homeBtn">Home</button>
      <button class="btn" id="openBtn">Open in new tab</button>
      <button class="btn primary" id="goBtn">Go</button>
    </div>
  </header>

  <section class="panel">
    <div class="address-row">
      <input id="addressInput" type="text" placeholder="Search the web or enter a URL" autocomplete="off" spellcheck="false" />
      <button class="btn primary" id="previewBtn">Preview</button>
    </div>
    <div class="controls">
      <div>Enter a URL or search term, then click Go or press Enter.</div>
      <div id="statusText">Ready</div>
    </div>
    <div class="quick-links">
      <button type="button" data-action="search" data-engine="DuckDuckGo">DuckDuckGo<span>Privacy-first search results</span></button>
      <button type="button" data-action="search" data-engine="Google">Google<span>Search with Google</span></button>
      <button type="button" data-action="search" data-engine="Bing">Bing<span>Search with Bing</span></button>
      <button type="button" data-action="go" data-url="https://example.com">Example.com<span>Open a direct website</span></button>
    </div>
  </section>

  <div class="browser-frame">
    <iframe id="browserFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
  </div>

  <script>
    const addressInput = document.getElementById('addressInput');
    const browserFrame = document.getElementById('browserFrame');
    const statusText = document.getElementById('statusText');
    const homeBtn = document.getElementById('homeBtn');
    const openBtn = document.getElementById('openBtn');
    const goBtn = document.getElementById('goBtn');
    const previewBtn = document.getElementById('previewBtn');
    const quickLinks = document.querySelector('.quick-links');

    const engines = {
      DuckDuckGo: 'https://html.duckduckgo.com/html?q=',
      Google: 'https://www.google.com/search?q=',
      Bing: 'https://www.bing.com/search?q=',
    };

    const homePage = 'data:text/html,' + encodeURIComponent(`
      <body style="margin:0;padding:0;font-family:system-ui, sans-serif;background:#090b12;color:#eef2ff;display:flex;align-items:center;justify-content:center;height:100vh;">
        <div style="max-width:760px;padding:28px;text-align:center;">
          <h1 style="margin:0 0 16px;font-size:2.4rem;">Welcome to Helios Browser</h1>
          <p style="margin:0 0 18px;color:#a5b0cc;line-height:1.7;">Use the address field to search the web or open a URL. This app gives you a browser-like preview and an option to open pages in a new tab when they cannot be embedded.</p>
          <ul style="text-align:left;color:#c7d0e5;line-height:1.8;">
            <li>Type a search query or a website address.</li>
            <li>Press Enter or click Go to load it inside the frame.</li>
            <li>Use Open in new tab for pages that block embedding.</li>
          </ul>
        </div>
      </body>
    `);

    function setStatus(text) {
      statusText.textContent = text;
    }

    function normalizeUrl(input) {
      const value = input.trim();
      if (!value) return '';
      if (/^https?:\/\//i.test(value)) return value;
      if (/^[^\s]+\.[^\s]{2,}$/i.test(value)) {
        return 'https://' + value.replace(/^https?:\/\//i, '');
      }
      return null;
    }

    function makeSearchUrl(query, engine) {
      return engines[engine] + encodeURIComponent(query.trim());
    }

    function loadUrl(url) {
      browserFrame.src = url;
      setStatus('Loading preview...');
    }

    function loadHome() {
      browserFrame.src = homePage;
      addressInput.value = '';
      setStatus('Ready');
    }

    function handleGo() {
      const value = addressInput.value;
      if (!value.trim()) {
        loadHome();
        return;
      }
      const direct = normalizeUrl(value);
      const target = direct || makeSearchUrl(value, 'DuckDuckGo');
      loadUrl(target);
    }

    function handlePreview() {
      const value = addressInput.value;
      if (!value.trim()) {
        setStatus('Type a search term or URL first.');
        return;
      }
      const direct = normalizeUrl(value);
      const target = direct || makeSearchUrl(value, 'DuckDuckGo');
      loadUrl(target);
    }

    function openTab() {
      const value = addressInput.value;
      if (!value.trim()) {
        setStatus('Type a search term or URL first.');
        return;
      }
      const direct = normalizeUrl(value);
      window.open(direct || makeSearchUrl(value, 'DuckDuckGo'), '_blank');
    }

    addressInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        handleGo();
      }
    });
    goBtn.addEventListener('click', handleGo);
    previewBtn.addEventListener('click', handlePreview);
    homeBtn.addEventListener('click', loadHome);
    openBtn.addEventListener('click', openTab);

    quickLinks.addEventListener('click', event => {
      const button = event.target.closest('button');
      if (!button) return;
      const action = button.dataset.action;
      if (action === 'search') {
        const engine = button.dataset.engine;
        const query = 'open web proxy browser';
        addressInput.value = `${engine} search`;
        loadUrl(makeSearchUrl(query, engine));
      }
      if (action === 'go') {
        const url = button.dataset.url;
        addressInput.value = url;
        loadUrl(url);
      }
    });

    browserFrame.addEventListener('load', () => {
      setStatus('Preview loaded. Use Open in new tab if embedding is blocked.');
    });

    loadHome();
  </script>
</body>
</html>
